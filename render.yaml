services:
  - type: web
    name: naver-real-estate
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: off
    healthCheckPath: /api/crawl-status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naver-real-estate-db
          property: connectionString
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
databases:
  - name: naver-real-estate-db
    plan: basic-256mb
    databaseName: naver_real_estate
    user: naver_real_estate
    ipAllowList: []
